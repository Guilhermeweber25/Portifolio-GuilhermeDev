<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="index.css">
    <title>Document</title>
</head>
<body>
    <header>
        <div class="container">
                <img src="image.png" alt="logo-marca" height="40px">
            <nav class="nav">
                <ul>
                    <li>
                        <a href="#">Ofertas</a>
                        <a href="#">Homens</a>
                        <a href="#">Mulheres</a>
                    </li>
                </ul>
            </nav>
        </div>
    </header>
<section class="slider">
    <div class="slider-content">
        <input type="radio" name="btn-radio" id="radio1">
        <input type="radio" name="btn-radio" id="radio2">
        <input type="radio" name="btn-radio" id="radio3">

        <div class="slider-box primeiro">
            <img class="img-desktop" src="maxresdefault.jpg" alt="slide 1">
        </div>
        <div class="slider-box">
            <img class="img-desktop" src="maxresdefault.jpg" alt="slide 2">
        </div>
        <div class="slider-box">
            <img class="img-desktop" src="renner.jpg" alt="slide 3">
        </div>

        <div class="nav-auto">
            <div class="auto-btn1"></div>
            <div class="auto-btn2"></div>
            <div class="auto-btn3"></div>
        </div>

        <div class="nav-manual">
            <label for="radio1" class="manual-btn"></label>
            <label for="radio2" class="manual-btn"></label>
            <label for="radio3" class="manual-btn"></label>
        </div>
    </div>
</section>
<script src="java-index.js"></script>

</body>
</html>
